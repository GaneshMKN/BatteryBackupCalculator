<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Battery Backup Calculator</title>
    <style>
        :root {
            --primary: #00dc82; /* Neon Green */
            --primary-dim: #00dc8233;
            --accent: #3b82f6; /* Blue */
            --bg: #0f172a; /* Dark Slate */
            --surface: #1e293b; /* Lighter Slate */
            --border: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 2rem;
            min-height: 100vh;
        }

        /* Layout Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        h1 {
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h1 span {
            color: var(--primary);
        }

        /* Main Grid */
        .calculator-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 768px) {
            .calculator-grid {
                grid-template-columns: 1fr;
            }
            body {
                padding: 1rem;
            }
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        input[type="number"] {
            width: 100%;
            padding: 0.6rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        .row-inputs {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .col-input {
            flex: 1;
        }

        /* Sliders */
        .slider-container {
            margin-top: 0.5rem;
            background: var(--bg);
            padding: 0.8rem;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .slider-value {
            color: var(--primary);
            font-weight: bold;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
            cursor: pointer;
        }

        /* Preview Box */
        .preview-box {
            background: var(--primary-dim);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 1rem;
        }

        /* Action Bar */
        .action-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 2rem;
        }

        .btn {
            background-color: var(--primary);
            color: var(--bg);
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
        }

        .btn:hover {
            filter: brightness(1.1);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Table */
        .table-container {
            overflow-x: auto;
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-style: italic;
        }
        
        /* Utility */
        .readonly-input {
            background-color: rgba(255,255,255,0.05);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1><span>⚡</span> Battery Calculator</h1>
        </header>

        <main>
            <div class="calculator-grid">
                <!-- Load Configuration -->
                <section class="card">
                    <div class="card-header">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
                        Load Configuration
                    </div>
                    
                    <form id="calcForm">
                        <div class="form-group">
                            <label for="loadVolt">Load Voltage (V)</label>
                            <input type="number" name="loadVolt" id="loadVolt" placeholder="e.g. 12" step="0.1">
                        </div>

                        <div class="form-group">
                            <label for="loadAmp">Load Amperes (A)</label>
                            <input type="number" name="loadAmp" id="loadAmp" placeholder="e.g. 5" step="0.1">
                        </div>

                        <div class="preview-box" id="loadPreview">0 W</div>
                    </form>
                </section>

                <!-- Battery Configuration -->
                <section class="card">
                    <div class="card-header">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12H3m18 0a9 9 0 11-18 0 9 9 0 0118 0z"></path><path d="M12 8v8m-4-4h8"></path></svg>
                        Battery Configuration
                    </div>
                    
                    <form id="batteryForm">
                        <!-- Voltage Section -->
                        <div class="row-inputs">
                            <div class="col-input">
                                <div class="form-group">
                                    <label for="cellVolt">Cell Voltage (V)</label>
                                    <input type="number" name="cellVolt" id="cellVolt" value="3.7" step="0.1">
                                </div>
                            </div>
                            <div class="col-input">
                                <div class="form-group">
                                    <label for="batteryNum">Series Count (S)</label>
                                    <input type="number" name="batteryNum" id="batteryNum" min="1" value="1">
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Total Pack Voltage (V)</label>
                            <input type="text" name="batteryVolt" id="batteryVolt" class="readonly-input" readonly>
                        </div>

                        <div class="slider-container">
                            <div class="slider-header">
                                <label>Quick Set Series (S)</label>
                                <span class="slider-value" id="sliderLabel">1S</span>
                            </div>
                            <input type="range" name="voltageSlider" id="voltageSlider" min="1" max="20" value="1" step="1">
                        </div>

                        <hr style="border: 0; border-top: 1px solid var(--border); margin: 1.5rem 0;">

                        <!-- Capacity Section -->
                        <div class="row-inputs">
                            <div class="col-input">
                                <div class="form-group">
                                    <label for="cellAmp">Cell Capacity (mAh)</label>
                                    <input type="number" name="cellAmp" id="cellAmp" placeholder="e.g. 2500">
                                </div>
                            </div>
                            <div class="col-input">
                                <div class="form-group">
                                    <label for="parallelNum">Parallel Count (P)</label>
                                    <input type="number" name="parallelNum" id="parallelNum" min="1" value="1">
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Total Pack Capacity (Ah)</label>
                            <input type="text" name="batteryAmp" id="batteryAmp" class="readonly-input" readonly>
                        </div>

                        <div class="slider-container">
                            <div class="slider-header">
                                <label>Quick Set Parallel (P)</label>
                                <span class="slider-value" id="capacitySliderLabel">1P</span>
                            </div>
                            <input type="range" name="capacitySlider" id="capacitySlider" min="1" max="10" value="1" step="1">
                        </div>

                        <div class="preview-box" id="batteryPreview">0 Wh</div>
                    </form>
                </section>
            </div>

            <div class="action-bar">
                <button type="button" id="submitBtn" class="btn">
                    Add Calculation to Table
                </button>
            </div>

            <!-- Result Table -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th width="10%">Load Volt ⚡</th>
                            <th width="10%">Load Amp</th>
                            <th width="10%">Batt Volt ⚡</th>
                            <th width="10%">Batt Amp</th>
                            <th width="10%">Load Wh</th>
                            <th width="10%">Batt Wh</th>
                            <th width="15%">Est. Runtime</th>
                            <th width="10%">Total Cells 🔋</th>
                            <th width="5%">Action</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody">
                        <tr class="empty-state-row">
                            <td colspan="9" class="empty-state">No calculations added yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // DOM Elements
        const form = document.getElementById('calcForm'); // Note: We have two forms in HTML but wrapping calculation logic in one object scope is easier.
        // Let's grab specific elements for clarity
        const els = {
            loadVolt: document.getElementById('loadVolt'),
            loadAmp: document.getElementById('loadAmp'),
            loadPreview: document.getElementById('loadPreview'),
            
            cellVolt: document.getElementById('cellVolt'),
            batteryNum: document.getElementById('batteryNum'),
            batteryVolt: document.getElementById('batteryVolt'),
            voltageSlider: document.getElementById('voltageSlider'),
            sliderLabel: document.getElementById('sliderLabel'),
            
            cellAmp: document.getElementById('cellAmp'),
            parallelNum: document.getElementById('parallelNum'),
            batteryAmp: document.getElementById('batteryAmp'),
            capacitySlider: document.getElementById('capacitySlider'),
            capacitySliderLabel: document.getElementById('capacitySliderLabel'),
            
            batteryPreview: document.getElementById('batteryPreview'),
            
            submitBtn: document.getElementById('submitBtn'),
            resultBody: document.getElementById('resultBody')
        };

        // State Management
        let hasRows = false;

        // --- Helper Functions ---

        // Update Load Preview
        function updateLoadPreview() {
            const v = parseFloat(els.loadVolt.value) || 0;
            const a = parseFloat(els.loadAmp.value) || 0;
            const w = v * a;
            els.loadPreview.innerText = `${w.toFixed(2)} W`;
        }

        // Update Battery Calculations
        function updateBatteryCalc() {
            const cellV = parseFloat(els.cellVolt.value) || 0;
            const sCount = parseInt(els.batteryNum.value) || 1;
            
            // Total Voltage
            const totalV = cellV * sCount;
            els.batteryVolt.value = totalV.toFixed(2);

            // Total Ampere (mAh -> Ah)
            const cellMah = parseFloat(els.cellAmp.value) || 0;
            const pCount = parseInt(els.parallelNum.value) || 1;
            
            // Convert mAh to Ah (divide by 1000) then multiply by parallel count
            const totalAh = (cellMah / 1000) * pCount;
            els.batteryAmp.value = totalAh.toFixed(2);

            // Battery Wh (Watt-hours)
            const battWh = totalV * totalAh;
            els.batteryPreview.innerText = `${battWh.toFixed(2)} Wh`;

            // Update Slider Labels to match inputs
            els.sliderLabel.innerText = `${sCount}S`;
            els.capacitySliderLabel.innerText = `${pCount}P`;
        }

        // --- Event Listeners ---

        // Load Listeners
        els.loadVolt.addEventListener('input', updateLoadPreview);
        els.loadAmp.addEventListener('input', updateLoadPreview);

        // Battery Voltage Listeners
        els.cellVolt.addEventListener('input', updateBatteryCalc);
        els.batteryNum.addEventListener('input', () => {
            // Update slider position when input changes manually
            els.voltageSlider.value = els.batteryNum.value;
            updateBatteryCalc();
        });

        // Battery Capacity Listeners
        els.cellAmp.addEventListener('input', updateBatteryCalc);
        els.parallelNum.addEventListener('input', () => {
            // Update slider position when input changes manually
            els.capacitySlider.value = els.parallelNum.value;
            updateBatteryCalc();
        });

        // Voltage Slider Logic
        els.voltageSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            els.batteryNum.value = val;
            // User specific logic: reset cellVolt to 3.7 on slider drag (from original code)
            // els.cellVolt.value = 3.7; // Optional: kept commented to allow user freedom, but can be enabled if desired.
            updateBatteryCalc();
        });

        // Capacity Slider Logic
        els.capacitySlider.addEventListener('input', (e) => {
            const val = e.target.value;
            els.parallelNum.value = val;
            updateBatteryCalc();
        });

        // --- Table Logic ---

        els.submitBtn.addEventListener('click', (e) => {
            e.preventDefault();

            // 1. Gather Values
            const lV = parseFloat(els.loadVolt.value);
            const lA = parseFloat(els.loadAmp.value);
            const bV = parseFloat(els.batteryVolt.value);
            const bA = parseFloat(els.batteryAmp.value);

            // 2. Validation
            if (!lV || !lA || !bV || !bA) {
                // Visual feedback for error instead of alert
                els.submitBtn.innerText = "⚠️ Fill all fields";
                els.submitBtn.style.backgroundColor = "var(--danger)";
                setTimeout(() => {
                    els.submitBtn.innerText = "Add Calculation to Table";
                    els.submitBtn.style.backgroundColor = "var(--primary)";
                }, 2000);
                return;
            }

            // 3. Calculations
            const loadWh = lV * lA;
            const battWh = bV * bA;
            let runtime = battWh / loadWh;
            if (!isFinite(runtime)) runtime = 0;
            
            const totalCells = (parseInt(els.batteryNum.value) || 0) * (parseInt(els.parallelNum.value) || 0);

            // 4. Remove Empty State if first row
            if (!hasRows) {
                els.resultBody.innerHTML = '';
                hasRows = true;
            }

            // 5. Create Row
            const tr = document.createElement('tr');
            
            // Helper to create cells
            const createCell = (text) => {
                const td = document.createElement('td');
                td.textContent = text;
                return td;
            };

            tr.appendChild(createCell(`${lV.toFixed(2)} V`));
            tr.appendChild(createCell(`${lA.toFixed(2)} A`));
            tr.appendChild(createCell(`${bV.toFixed(2)} V`));
            tr.appendChild(createCell(`${bA.toFixed(2)} Ah`));
            tr.appendChild(createCell(loadWh.toFixed(2)));
            tr.appendChild(createCell(battWh.toFixed(2)));
            
            // Runtime with color coding
            const timeTd = document.createElement('td');
            timeTd.textContent = `${runtime.toFixed(2)} h`;
            if (runtime < 1) timeTd.style.color = 'var(--danger)';
            tr.appendChild(timeTd);

            tr.appendChild(createCell(totalCells));

            // Delete Action
            const actionTd = document.createElement('td');
            const delBtn = document.createElement('button');
            delBtn.innerHTML = '&times;';
            delBtn.style.background = 'none';
            delBtn.style.border = 'none';
            delBtn.style.color = 'var(--danger)';
            delBtn.style.fontSize = '1.5rem';
            delBtn.style.cursor = 'pointer';
            delBtn.title = "Remove row";
            delBtn.onclick = function() {
                tr.remove();
                if (els.resultBody.children.length === 0) {
                    hasRows = false;
                    els.resultBody.innerHTML = '<tr class="empty-state-row"><td colspan="9" class="empty-state">No calculations added yet.</td></tr>';
                }
            };
            actionTd.appendChild(delBtn);
            tr.appendChild(actionTd);

            // 6. Append with Animation
            tr.style.opacity = '0';
            els.resultBody.prepend(tr); // Add new rows to top
            
            // Trigger reflow
            void tr.offsetWidth; 
            tr.style.transition = 'opacity 0.5s';
            tr.style.opacity = '1';
        });

        // Initialize default view
        updateBatteryCalc();

    </script>
</body>
</html>
